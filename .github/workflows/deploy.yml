name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Copy files to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MV_AZURE }}
          username: Joseadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/*,Dockerfile,nginx.conf,.dockerignore"
          target: "~/integraciones-tagamics"
          overwrite: true
          rm: true

      - name: Deploy Docker on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MV_AZURE }}
          username: Joseadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            cd ~/integraciones-tagamics

            # Create a simpler Dockerfile that just serves the pre-built dist
            cat > Dockerfile.prod << 'EOF'
            FROM nginx:stable-alpine
            COPY nginx.conf /etc/nginx/conf.d/default.conf
            COPY dist/ /usr/share/nginx/html/
            EXPOSE 80
            CMD ["nginx", "-g", "daemon off;"]
            EOF

            # Stop and remove existing container
            docker stop tagamics-app 2>/dev/null || true
            docker rm tagamics-app 2>/dev/null || true

            # Build lightweight image (no Node.js needed!)
            docker build -f Dockerfile.prod -t tagamics-app .

            # Run the container
            docker run -d --name tagamics-app -p 8080:80 --restart always tagamics-app

            echo "=== DEPLOY SUCCESS ==="
