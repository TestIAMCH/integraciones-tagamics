name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Secrets
        run: |
          test -n "${{ secrets.MP_ACCESS_TOKEN }}" || (echo "Missing MP_ACCESS_TOKEN secret" && exit 1)
          test -n "${{ secrets.VITE_MP_PUBLIC_KEY }}" || (echo "Missing VITE_MP_PUBLIC_KEY secret" && exit 1)

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        env:
          VITE_MP_PUBLIC_KEY: ${{ secrets.VITE_MP_PUBLIC_KEY }}
        run: npm run build

      - name: Copy files to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MV_AZURE }}
          username: Joseadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/*,Dockerfile,server.js,package.json,package-lock.json,.dockerignore"
          target: "~/integraciones-tagamics"
          overwrite: true
          rm: true

      - name: Deploy Docker on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MV_AZURE }}
          username: Joseadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            cd ~/integraciones-tagamics

            # Stop and remove existing container
            docker stop tagamics-app 2>/dev/null || true
            docker rm tagamics-app 2>/dev/null || true

            # Build unified frontend + backend image
            docker build -t tagamics-app .

            # Run the container with runtime secrets
            docker run -d \
              --name tagamics-app \
              -p 8080:3000 \
              --restart always \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e MP_ACCESS_TOKEN='${{ secrets.MP_ACCESS_TOKEN }}' \
              -e ALLOWED_ORIGINS='${{ secrets.ALLOWED_ORIGINS }}' \
              tagamics-app

            echo "=== DEPLOY SUCCESS ==="
