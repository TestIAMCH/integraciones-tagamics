name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Load Tagamics Secret Bundle
        env:
          TAGAMICS_SECRET: ${{ secrets.Tagamics_secret || secrets.TAGAMICS_SECRET }}
        run: |
          test -n "$TAGAMICS_SECRET" || (echo "Missing Tagamics_secret secret" && exit 1)
          printf '%s\n' "$TAGAMICS_SECRET" >> "$GITHUB_ENV"

      - name: Validate Secrets
        run: |
          test -n "$MP_ACCESS_TOKEN" || (echo "Missing MP_ACCESS_TOKEN in Tagamics_secret" && exit 1)
          test -n "$VITE_MP_PUBLIC_KEY" || (echo "Missing VITE_MP_PUBLIC_KEY in Tagamics_secret" && exit 1)

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Copy files to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MV_AZURE }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/*,Dockerfile,server.js,package.json,package-lock.json,docker-compose.yml,Caddyfile"
          target: "~/integraciones-tagamics"
          overwrite: true
          rm: true

      - name: Deploy Docker Compose on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MV_AZURE }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            cd ~/integraciones-tagamics

            cat > .env << 'EOF'
            ${{ secrets.Tagamics_secret || secrets.TAGAMICS_SECRET }}
            EOF

            sudo docker-compose down || true
            sudo docker-compose up -d --build
            sudo docker-compose ps

            echo "=== DEPLOY SUCCESS ==="
