<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tagamics | Sillon Nº1</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="top-bar">
          <span class="session-id">Sillon Nº1</span>
          <div class="header-actions">
            <span class="date" id="current-date">3 de abril</span>
            <a href="/config.html" class="config-btn" title="Configuración">
              <i data-lucide="settings"></i>
            </a>
          </div>
        </div>
        <h1 class="main-title">Elige un modo de juego</h1>
      </header>

      <main class="content">
        <section class="packages-section">
          <h2 class="section-label">1. ELIGE TU PAQUETE</h2>
          <div class="packages-grid" id="packages-grid">
            <!-- Dynamic Injection via main.js -->
            <div class="loading-state">Cargando paquetes...</div>
          </div>
        </section>

        <section class="payments-section">
          <h2 class="section-label">2. SELECCIONA TU MÉTODO DE PAGO</h2>
          <div class="payments-grid disabled" id="payments-grid">
            <button class="payment-btn" data-method="mercado-pago">
              <div class="payment-icon mp">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 32px; height: 32px;">
                  <path d="M24 48c13.255 0 24-10.745 24-24S37.255 0 24 0 0 10.745 0 24s10.745 24 24 24z" fill="#009EE3"/>
                  <path d="M14.5 18s2.5-3.5 9.5-3.5 9.5 3.5 9.5 3.5v12s-2.5 3.5-9.5 3.5-9.5-3.5-9.5-3.5V18z" fill="#fff"/>
                  <path d="M24 30.5c-7 0-9.5-3.5-9.5-3.5V18s2.5-3.5 9.5-3.5 9.5 3.5 9.5 3.5v12.5s-2.5-3.5-9.5-3.5z" fill="#fff"/>
                  <path d="M19 22.5c0-.828.672-1.5 1.5-1.5s1.5.672 1.5 1.5-.672 1.5-1.5 1.5-1.5-.672-1.5-1.5zm8 0c0-.828.672-1.5 1.5-1.5s1.5.672 1.5 1.5-.672 1.5-1.5 1.5-1.5-.672-1.5-1.5z" fill="#009EE3"/>
                </svg>
              </div>
              <span>Mercado Pago</span>
            </button>
            <button class="payment-btn" data-method="credit-card">
              <div class="payment-icon credit">
                <i data-lucide="credit-card"></i>
              </div>
              <span>Tarjeta</span>
            </button>
            <button class="payment-btn" data-method="paypal">
              <div class="payment-icon paypal">
                <i data-lucide="send"></i>
              </div>
              <span>PayPal</span>
            </button>
            <button class="payment-btn" data-method="pago-facil">
              <div class="payment-icon cash">
                <i data-lucide="banknote"></i>
              </div>
              <span>Pago Fácil</span>
            </button>
            <button class="payment-btn" data-method="rapipago">
              <div class="payment-icon help">
                <i data-lucide="landmark"></i>
              </div>
              <span>Rapipago</span>
            </button>
            <button class="payment-btn" data-method="crypto">
              <div class="payment-icon crypto">
                <i data-lucide="bitcoin"></i>
              </div>
              <span>Crypto</span>
            </button>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>&copy; 2026 Tagamics. Todos los derechos reservados.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
