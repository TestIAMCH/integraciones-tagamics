<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tagamics | Sillon Nº1</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="top-bar">
          <span class="session-id">Sillon Nº1</span>
          <div class="header-actions">
            <span class="date" id="current-date">3 de abril</span>
            <a href="/config.html" class="config-btn" title="Configuración">
              <i data-lucide="settings"></i>
            </a>
          </div>
        </div>
        <h1 class="main-title">Elige un modo de juego</h1>
      </header>

      <main class="content">
        <section class="packages-section">
          <h2 class="section-label">1. ELIGE TU PAQUETE</h2>
          <div class="packages-grid" id="packages-grid">
            <!-- Dynamic Injection via main.js -->
            <div class="loading-state">Cargando paquetes...</div>
          </div>
        </section>

        <section class="payments-section">
          <h2 class="section-label">2. SELECCIONA TU MÉTODO DE PAGO</h2>
          <p class="payment-hint">Elige un paquete para habilitar los métodos de pago.</p>
          <div id="smart-payment-container" class="payment-stack disabled-stack"></div>
        </section>
      </main>

      <footer class="footer">
        <p>&copy; 2026 Tagamics. Todos los derechos reservados.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
